openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CO-Finance - Personal Finance API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: Authenticated user account management
  - name: profiles
    description: User profiles (multi-tenant)
  - name: categories
    description: Transaction categories
  - name: commitment-types
    description: Bill commitment types
  - name: persons
    description: People and companies
  - name: bank-accounts
    description: Bank accounts
  - name: credit-cards
    description: Credit cards
  - name: invoices
    description: Monthly credit card invoices
  - name: card-transactions
    description: Credit card transactions
  - name: accounts-payable
    description: Bills to pay
  - name: accounts-receivable
    description: Bills to receive
  - name: import-logs
    description: Import history logs
  - name: category-rules
    description: Auto-categorization rules
  - name: card-installments
    description: Credit card installment groups
  - name: dashboard
    description: Dashboard summary data
  - name: ai
    description: AI copilot inspection (failed-question learning)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Profiles ──────────────────────────────────────────────────────────────
  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List profiles for the authenticated user
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create a profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
    patch:
      operationId: updateProfile
      tags: [profiles]
      summary: Update a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    delete:
      operationId: deleteProfile
      tags: [profiles]
      summary: Delete a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Profile not found
        "409":
          description: Profile contains financial data and cannot be deleted

  # ── Categories ─────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Commitment Types ────────────────────────────────────────────────────────
  /commitment-types:
    get:
      operationId: listCommitmentTypes
      tags: [commitment-types]
      summary: List commitment types
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Commitment types list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommitmentType"
    post:
      operationId: createCommitmentType
      tags: [commitment-types]
      summary: Create a commitment type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommitmentTypeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitmentType"

  /commitment-types/{id}:
    get:
      operationId: getCommitmentType
      tags: [commitment-types]
      summary: Get a commitment type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Commitment type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitmentType"
        "404":
          description: Not found
    patch:
      operationId: updateCommitmentType
      tags: [commitment-types]
      summary: Update a commitment type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommitmentTypeBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitmentType"
    delete:
      operationId: deleteCommitmentType
      tags: [commitment-types]
      summary: Delete a commitment type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Persons ─────────────────────────────────────────────────────────────────
  /persons:
    get:
      operationId: listPersons
      tags: [persons]
      summary: List persons/companies
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Persons list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Person"
    post:
      operationId: createPerson
      tags: [persons]
      summary: Create a person/company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"

  /persons/{id}:
    get:
      operationId: getPerson
      tags: [persons]
      summary: Get a person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Person
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "404":
          description: Not found
    patch:
      operationId: updatePerson
      tags: [persons]
      summary: Update a person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePersonBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
    delete:
      operationId: deletePerson
      tags: [persons]
      summary: Delete a person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Bank Accounts ───────────────────────────────────────────────────────────
  /bank-accounts:
    get:
      operationId: listBankAccounts
      tags: [bank-accounts]
      summary: List bank accounts
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bank accounts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BankAccount"
    post:
      operationId: createBankAccount
      tags: [bank-accounts]
      summary: Create a bank account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBankAccountBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankAccount"

  /bank-accounts/{id}:
    get:
      operationId: getBankAccount
      tags: [bank-accounts]
      summary: Get a bank account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bank account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankAccount"
        "404":
          description: Not found
    patch:
      operationId: updateBankAccount
      tags: [bank-accounts]
      summary: Update a bank account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBankAccountBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankAccount"
    delete:
      operationId: deleteBankAccount
      tags: [bank-accounts]
      summary: Delete a bank account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Credit Cards ────────────────────────────────────────────────────────────
  /credit-cards:
    get:
      operationId: listCreditCards
      tags: [credit-cards]
      summary: List credit cards
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Credit cards list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreditCard"
    post:
      operationId: createCreditCard
      tags: [credit-cards]
      summary: Create a credit card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreditCardBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditCard"

  /credit-cards/{id}:
    get:
      operationId: getCreditCard
      tags: [credit-cards]
      summary: Get a credit card
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Credit card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditCard"
        "404":
          description: Not found
    patch:
      operationId: updateCreditCard
      tags: [credit-cards]
      summary: Update a credit card
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCreditCardBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditCard"
    delete:
      operationId: deleteCreditCard
      tags: [credit-cards]
      summary: Delete a credit card
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Invoices ────────────────────────────────────────────────────────────────
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices for a card
      parameters:
        - name: cardId
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Invoices list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "409":
          description: Duplicate invoice for card+year+month

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceRequest"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ── Card Transactions ───────────────────────────────────────────────────────
  /card-transactions:
    get:
      operationId: listCardTransactions
      tags: [card-transactions]
      summary: List card transactions
      parameters:
        - name: invoiceId
          in: query
          required: false
          schema:
            type: integer
        - name: cardId
          in: query
          required: false
          schema:
            type: integer
        - name: profileId
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Transactions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CardTransaction"
    post:
      operationId: createCardTransaction
      tags: [card-transactions]
      summary: Create a card transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCardTransactionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardTransaction"

  /card-transactions/{id}:
    get:
      operationId: getCardTransaction
      tags: [card-transactions]
      summary: Get a card transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Card transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardTransaction"
        "404":
          description: Not found
    patch:
      operationId: updateCardTransaction
      tags: [card-transactions]
      summary: Update a card transaction (e.g. change category)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCardTransactionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardTransaction"
    delete:
      operationId: deleteCardTransaction
      tags: [card-transactions]
      summary: Delete a card transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /card-transactions/import:
    post:
      operationId: importCardTransactions
      tags: [card-transactions]
      summary: Import CSV or OFX file for a card and month
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportCardTransactionsBody"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /card-transactions/{id}/generate-installments:
    post:
      operationId: generateCardTransactionInstallments
      tags: [card-transactions]
      summary: Generate future installments for an existing card transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateInstallmentsBody"
      responses:
        "200":
          description: Generated installments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateInstallmentsResponse"

  /card-transactions/{id}/set-installment:
    patch:
      operationId: setCardTransactionInstallment
      tags: [card-transactions]
      summary: Redefine installment metadata for a card transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCardTransactionInstallmentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetCardTransactionInstallmentResponse"

  # ── Accounts Payable ────────────────────────────────────────────────────────
  /accounts-payable:
    get:
      operationId: listAccountsPayable
      tags: [accounts-payable]
      summary: List accounts payable
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [open, paid, overdue, cancelled]
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Accounts payable list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountPayable"
    post:
      operationId: createAccountPayable
      tags: [accounts-payable]
      summary: Create an account payable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountPayableBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPayable"

  /accounts-payable/{id}:
    get:
      operationId: getAccountPayable
      tags: [accounts-payable]
      summary: Get an account payable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account payable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPayable"
        "404":
          description: Not found
    patch:
      operationId: updateAccountPayable
      tags: [accounts-payable]
      summary: Update an account payable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountPayableBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPayable"
    delete:
      operationId: deleteAccountPayable
      tags: [accounts-payable]
      summary: Delete an account payable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /accounts-payable/{id}/recurrence-info:
    get:
      operationId: getAccountPayableRecurrenceInfo
      tags: [accounts-payable]
      summary: Returns information about the recurrence series this payable belongs to (used to warn before deletion)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recurrence info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurrenceInfo"

  /accounts-payable/{id}/pay:
    post:
      operationId: payAccountPayable
      tags: [accounts-payable]
      summary: Mark an account payable as paid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayAccountBody"
      responses:
        "200":
          description: Paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPayable"

  # ── Accounts Receivable ─────────────────────────────────────────────────────
  /accounts-receivable:
    get:
      operationId: listAccountsReceivable
      tags: [accounts-receivable]
      summary: List accounts receivable
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [open, received, overdue, cancelled]
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Accounts receivable list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountReceivable"
    post:
      operationId: createAccountReceivable
      tags: [accounts-receivable]
      summary: Create an account receivable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountReceivableBody"
