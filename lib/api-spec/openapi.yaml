components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Profile ──────────────────────────────────────────────────────────────
    Profile:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        name:
          type: string
        isDefault:
          type: boolean
        status:
          type: string
          enum: [active, archived]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, clerkUserId, name, isDefault, status, createdAt, updatedAt]

    CreateProfileBody:
      type: object
      properties:
        name:
          type: string
        isDefault:
          type: boolean
      required: [name]

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        isDefault:
          type: boolean
        status:
          type: string
          enum: [active, archived]

    # ── Category ─────────────────────────────────────────────────────────────
    CategoryType:
      type: string
      enum: [expense, income, both]

    Category:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        name:
          type: string
        color:
          type: string
        icon:
          type: ["string", "null"]
        type:
          $ref: "#/components/schemas/CategoryType"
        isDefault:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, profileId, name, color, type, isDefault, isActive, createdAt]

    CreateCategoryBody:
      type: object
      properties:
        profileId:
          type: integer
        name:
          type: string
        color:
          type: string
        icon:
          type: ["string", "null"]
        type:
          $ref: "#/components/schemas/CategoryType"
        isActive:
          type: boolean
      required: [profileId, name, color]

    UpdateCategoryBody:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        icon:
          type: ["string", "null"]
        type:
          $ref: "#/components/schemas/CategoryType"
        isActive:
          type: boolean

    # ── Commitment Type ──────────────────────────────────────────────────────
    CommitmentType:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        name:
          type: string
        isDefault:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, profileId, name, isDefault, isActive, createdAt]

    CreateCommitmentTypeBody:
      type: object
      properties:
        profileId:
          type: integer
        name:
          type: string
        isActive:
          type: boolean
      required: [profileId, name]

    UpdateCommitmentTypeBody:
      type: object
      properties:
        name:
          type: string
        isActive:
          type: boolean

    # ── Person ───────────────────────────────────────────────────────────────
    Person:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [person, company]
        document:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        zipCode:
          type: ["string", "null"]
        street:
          type: ["string", "null"]
        streetNumber:
          type: ["string", "null"]
        complement:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, profileId, name, type, createdAt, updatedAt]

    CreatePersonBody:
      type: object
      properties:
        profileId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [person, company]
        document:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        zipCode:
          type: ["string", "null"]
        street:
          type: ["string", "null"]
        streetNumber:
          type: ["string", "null"]
        complement:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required: [profileId, name, type]

    UpdatePersonBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [person, company]
        document:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        zipCode:
          type: ["string", "null"]
        street:
          type: ["string", "null"]
        streetNumber:
          type: ["string", "null"]
        complement:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    # ── Bank Account ─────────────────────────────────────────────────────────
    BankAccount:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        name:
          type: string
        bank:
          type: string
        accountNumber:
          type: ["string", "null"]
        agency:
          type: ["string", "null"]
        balance:
          type: number
          description: Saldo inicial (base)
        currentBalance:
          type: number
          description: Saldo atual calculado (saldo inicial + recebimentos - pagamentos)
        color:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, profileId, name, bank, balance, currentBalance, color, isActive, createdAt, updatedAt]

    CreateBankAccountBody:
      type: object
      properties:
        profileId:
          type: integer
        name:
          type: string
        bank:
          type: string
        accountNumber:
          type: ["string", "null"]
        agency:
          type: ["string", "null"]
        balance:
          type: number
        color:
          type: string
      required: [profileId, name, bank, balance, color]

    UpdateBankAccountBody:
      type: object
      properties:
        name:
          type: string
        bank:
          type: string
        accountNumber:
          type: ["string", "null"]
        agency:
          type: ["string", "null"]
        balance:
          type: number
        color:
          type: string
        isActive:
          type: boolean

    # ── Credit Card ──────────────────────────────────────────────────────────
    CreditCard:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        name:
          type: string
        brand:
          type: string
        lastFour:
          type: ["string", "null"]
        creditLimit:
          type: number
        usedAmount:
          type: number
          description: Sum of all non-cancelled transactions on unpaid invoices (consumes the limit)
        closingDay:
          type: integer
        dueDay:
          type: integer
        color:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, profileId, name, brand, creditLimit, usedAmount, closingDay, dueDay, color, isActive, createdAt, updatedAt]

    CreateCreditCardBody:
      type: object
      properties:
        profileId:
          type: integer
        name:
          type: string
        brand:
          type: string
        lastFour:
          type: ["string", "null"]
        creditLimit:
          type: number
        closingDay:
          type: integer
        dueDay:
          type: integer
        color:
          type: string
      required: [profileId, name, brand, creditLimit, closingDay, dueDay, color]

    UpdateCreditCardBody:
      type: object
      properties:
        name:
          type: string
        brand:
          type: string
        lastFour:
          type: ["string", "null"]
        creditLimit:
          type: number
        closingDay:
          type: integer
        dueDay:
          type: integer
        color:
          type: string
        isActive:
          type: boolean

    # ── Invoice ──────────────────────────────────────────────────────────────
    Invoice:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        cardId:
          type: integer
        year:
          type: integer
        month:
          type: integer
        totalAmount:
          type: number
        status:
          type: string
          enum: [open, closed, paid]
        dueDate:
